name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-source-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Checkout content-source
        uses: actions/checkout@v4
        with:
          repository: superbear-universe/content-source
          path: content-source

      - name: Copy source content into website
        run: |
          cp -r content-source/characters characters
          cp -r content-source/lore lore
          cp -r content-source/stories stories
          [ -d content-source/assets/images ] && cp -r content-source/assets/images/. assets/images/
          # Section index pages must be top-level nav items — give them an explicit
          # empty parent so _config.yml defaults cannot assign a self-referential one.
          sed -i '/^has_children: true/a parent: ""' characters/index.md lore/index.md stories/index.md

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
