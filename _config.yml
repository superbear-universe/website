# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Superbear Chronicles
description: Archive for stories from the Superbear Universe.
baseurl: "/website"
url: "https://superbear-universe.github.io"

# Build settings
exclude:
  - content-source
  - vendor

remote_theme: just-the-docs/just-the-docs
color_scheme: superbear-dark

plugins:
  - jekyll-feed
  - jekyll-remote-theme

# Just the Docs settings
search_enabled: true
nav_sort: case_insensitive

aux_links:
  "Tumblr":
    - "https://tumblr.com/superbear-chronicles"
  "GitHub":
    - "https://github.com/superbear-universe"

aux_links_new_tab: true

footer_content: "Superbear Chronicles"

# Apply default front matter to content copied in from source/
defaults:
  - scope:
      path: "stories"
    values:
      layout: default
      parent: "Stories"
  - scope:
      path: "characters"
    values:
      layout: default
      parent: "Characters"
  - scope:
      path: "lore"
    values:
      layout: default
      parent: "Lore"
  # Clear parent for section index pages so they appear as top-level nav items
  - scope:
      path: "stories/index"
    values:
      parent: null
  - scope:
      path: "characters/index"
    values:
      parent: null
  - scope:
      path: "lore/index"
    values:
      parent: null